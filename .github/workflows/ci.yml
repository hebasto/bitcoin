name: CI
on:
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request.
  pull_request:
  # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#push.
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1  # GHA does not care about dangling processes and setting this variable avoids killing the CI script itself on error
  MAKEJOBS: '-j10'

jobs:
  windows-cross:
    name: 'Windows cross, no tests'
    runs-on: ubuntu-latest
    if: ${{ vars.SKIP_BRANCH_PUSH != 'true' || github.event_name == 'pull_request' }}

    env:
      FILE_ENV: './ci/test/00_setup_env_win64.sh'
      DANGER_CI_ON_HOST_CACHE_FOLDERS: 1
      DANGER_CI_ON_HOST_BUILD_FOLDER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "BASE_ROOT_DIR=${{ runner.temp }}" >> "$GITHUB_ENV"
          echo "DEPENDS_DIR=${{ runner.temp }}/depends" >> "$GITHUB_ENV"
          echo "CCACHE_DIR=${{ runner.temp }}/ccache_dir" >> "$GITHUB_ENV"
          echo "BASE_BUILD_DIR=${{ github.workspace }}/build" >> "$GITHUB_ENV"
          # Required for the next step.
          cp ${{ env.FILE_ENV }} depends/

      - name: Depends fingerprint
        id: depends_fingerprint
        run: |
          echo "hash=${{ hashFiles('depends/**') }}" >> "$GITHUB_OUTPUT"

      - name: Depends cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DEPENDS_DIR }}/built
          key: ${{ github.job }}-depends-${{ steps.depends_fingerprint.outputs.hash }}

      - name: Restore Ccache cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.job }}-ccache-${{ github.run_id }}
          restore-keys: ${{ github.job }}-ccache-

      - name: CI script
        env:
          # Using the "Release" build type to avoid oversized executables to pass to the following job.
          CMAKE_BUILD_TYPE: 'Release'
        run: ./ci/test_run_all.sh

      - name: Save Ccache cache
        uses: actions/cache/save@v4
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.job }}-ccache-${{ github.run_id }}

      - name: Upload built executables
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-w64-mingw32-executables-${{ github.run_id }}
          path: |
            build/src/*.exe
            build/src/bench/bench_bitcoin.exe
            build/src/test/test_bitcoin.exe
            build/test/config.ini

  windows-native-test:
    name: 'Test on Windows'
    runs-on: windows-2022
    needs: windows-cross

    env:
      BITCOIND: '${{ github.workspace }}\bitcoind.exe'
      BITCOINCLI: '${{ github.workspace }}\bitcoin-cli.exe'
      BITCOINUTIL: '${{ github.workspace }}\bitcoin-util.exe'
      BITCOINTX: '${{ github.workspace }}\bitcoin-tx.exe'
      BITCOINWALLET: '${{ github.workspace }}\bitcoin-wallet.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built executables
        uses: actions/download-artifact@v4
        with:
          name: x86_64-w64-mingw32-executables-${{ github.run_id }}
          path: ${{ github.workspace }}/build

      - name: Run bitcoind.exe
        run: |
          .\build\src\bitcoind.exe -version

      - run: |
          Get-Content "build\test\config.ini"

      - run: |
          (Get-Content "build\test\config.ini") -replace '(?<=^SRCDIR=).*', '${{ github.workspace }}' | Set-Content "build\test\config.ini"

      - run: |
          Get-Content "build\test\config.ini"

      # - name: Run benchmarks
      #   run: |
      #     .\bench_bitcoin.exe -sanity-check -priority-level=high

      # - name: Run util tests
      #   run: py -3 test\util\test_runner.py

      # - name: Run unit tests
      #   run: |
      #     .\test_bitcoin.exe

      - run: |
          dir
